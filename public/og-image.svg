<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="bgGrad" cx="22%" cy="14%" r="95%">
      <stop offset="0%" stop-color="#2a7a52"/>
      <stop offset="60%" stop-color="#1a5c38"/>
      <stop offset="100%" stop-color="#0c3a22"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="boltGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <text x="600" y="105" font-weight="900" font-size="86" fill="#ffffff" text-anchor="middle" letter-spacing="-3">Tap once.</text>
  <text x="600" y="170" font-weight="700" font-size="36" fill="#e8a838" text-anchor="middle" letter-spacing="-0.5">Your week's groceries drop into Instacart.</text>
  <g transform="translate(120, 220)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="240" height="330" rx="26" fill="#0f3d24" stroke="#e8a838" stroke-width="3"/>
    <rect x="14" y="46" width="212" height="248" rx="6" fill="#ffffff"/>
    <rect x="98" y="18" width="44" height="6" rx="3" fill="#e8a838" opacity="0.35"/>
    <text x="120" y="74" font-weight="800" font-size="15" fill="#1a5c38" text-anchor="middle" letter-spacing="0.5">YOUR WEEK</text>
    <line x1="40" y1="84" x2="200" y2="84" stroke="#e8a838" stroke-width="2"/>
    <g font-size="12" fill="#1a5c38">
      <circle cx="32" cy="106" r="3.5" fill="#e8a838"/><text x="44" y="110" font-weight="700">Mon</text><text x="78" y="110">Chicken Tacos</text>
      <circle cx="32" cy="134" r="3.5" fill="#e8a838"/><text x="44" y="138" font-weight="700">Tue</text><text x="78" y="138">Lemon Pasta</text>
      <circle cx="32" cy="162" r="3.5" fill="#e8a838"/><text x="44" y="166" font-weight="700">Wed</text><text x="78" y="166">Sheet Pan Pork</text>
      <circle cx="32" cy="190" r="3.5" fill="#e8a838"/><text x="44" y="194" font-weight="700">Thu</text><text x="78" y="194">Leftover Bowls</text>
      <circle cx="32" cy="218" r="3.5" fill="#e8a838"/><text x="44" y="222" font-weight="700">Fri</text><text x="78" y="222">Pizza Night</text>
    </g>
    <rect x="22" y="248" width="196" height="38" rx="8" fill="#e8a838"/>
    <text x="120" y="272" font-weight="800" font-size="13" fill="#1a3a20" text-anchor="middle">Send to Instacart  &#8594;</text>
    <rect x="90" y="305" width="60" height="4" rx="2" fill="#e8a838" opacity="0.3"/>
  </g>
  <g transform="translate(420, 370)">
    <circle cx="80" cy="40" r="115" fill="url(#boltGlow)"/>
    <g stroke="#e8a838" stroke-width="4" stroke-linecap="round" opacity="0.65">
      <line x1="-40" y1="-5" x2="-5" y2="-5"/><line x1="-55" y1="25" x2="-15" y2="25"/><line x1="-40" y1="55" x2="-5" y2="55"/>
      <line x1="165" y1="-5" x2="200" y2="-5"/><line x1="175" y1="25" x2="215" y2="25"/><line x1="165" y1="55" x2="200" y2="55"/>
    </g>
    <path d="M 75 -25 L 35 50 L 75 50 L 50 130 L 145 35 L 90 35 L 115 -25 Z" fill="#e8a838" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    <g transform="translate(0,135)">
      <g transform="translate(-25,15) rotate(-25)">
        <ellipse cx="0" cy="0" rx="9" ry="16" fill="#ff8a1f"/>
        <path d="M -7 -14 L -3 -22 M 0 -16 L 0 -25 M 7 -14 L 3 -22" stroke="#5fa97a" stroke-width="3" stroke-linecap="round"/>
      </g>
      <g transform="translate(75,5) rotate(10)">
        <path d="M -12 -16 L -12 14 L 12 14 L 12 -16 L 6 -22 L -6 -22 Z" fill="#ffffff" stroke="#1a5c38" stroke-width="1"/>
        <rect x="-9" y="-12" width="18" height="6" fill="#5fa97a"/>
      </g>
      <g transform="translate(170,12) rotate(-12)">
        <ellipse cx="0" cy="0" rx="18" ry="11" fill="#d4a06b"/>
        <line x1="-13" y1="0" x2="13" y2="0" stroke="#8a5a2b" stroke-width="2"/>
        <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#8a5a2b" stroke-width="1.5" opacity="0.6"/>
      </g>
    </g>
  </g>
  <g transform="translate(820, 240)" filter="url(#dropShadow)">
    <g transform="translate(135,-5)">
      <ellipse cx="0" cy="14" rx="11" ry="16" fill="#ff8a1f"/>
      <path d="M -3 -2 L 0 -10 L 3 -2 M -6 1 L -2 -6 M 6 1 L 2 -6" stroke="#5fa97a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </g>
    <text x="135" y="50" font-size="11" fill="#ffffff" fill-opacity="0.7" text-anchor="middle" font-style="italic" font-weight="500">Powered by Instacart</text>
    <g stroke="#ffffff" stroke-width="4.5" fill="none" stroke-linejoin="round">
      <path d="M 25 85 L 35 200 L 235 200 L 250 85 Z" fill="#ffffff" fill-opacity="0.08"/>
      <path d="M -8 60 L 25 60 L 50 80" stroke-linecap="round"/>
      <circle cx="70" cy="230" r="14" fill="#ffffff" fill-opacity="0.15"/>
      <circle cx="200" cy="230" r="14" fill="#ffffff" fill-opacity="0.15"/>
    </g>
    <g font-weight="700" font-size="14" fill="#ffffff">
      <text x="55" y="118">&#10003; Chicken thighs</text>
      <text x="55" y="142">&#10003; Tortillas</text>
      <text x="55" y="166">&#10003; Lemons</text>
      <text x="55" y="190">&#10003; Mozzarella</text>
    </g>
    <text x="225" y="115" font-weight="800" font-size="13" fill="#e8a838" text-anchor="end">+ 18 more</text>
    <g transform="translate(138, 270)">
      <rect x="-115" y="-18" width="230" height="36" rx="6" fill="#e8a838"/>
      <text x="0" y="6" font-weight="900" font-size="15" fill="#1a3a20" text-anchor="middle" letter-spacing="2.5">READY TO CHECK OUT</text>
    </g>
  </g>
  <rect x="0" y="555" width="1200" height="75" fill="#000000" fill-opacity="0.22"/>
  <g transform="translate(50, 596)">
    <circle cx="11" cy="-1" r="11" fill="#e8a838"/>
    <text x="32" y="7" font-weight="900" font-size="24" fill="#ffffff">DinnerDrop</text>
  </g>
  <text x="1145" y="588" font-weight="800" font-size="20" fill="#e8a838" text-anchor="end">First 100 families = 6 months FREE</text>
  <text x="1145" y="613" font-weight="500" font-size="13" fill="#ffffff" fill-opacity="0.75" text-anchor="end">use code BETA100 &#183; dinnerdrop.app</text>
</svg>
